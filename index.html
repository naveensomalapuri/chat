<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velvet Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-app:       #f5f5f5;
  --bg-sidebar:   #ffffff;
  --bg-chat:      #ffffff;
  --bg-msg-area:  #f5f5f5;
  --bg-input:     #ffffff;
  --bg-mine:      #e8f0fb;
  --bg-theirs:    #ffffff;
  --border:       #e0e0e0;
  --accent:       #6264a7;
  --accent-hover: #585a9c;
  --accent-light: #eeeef8;
  --text-primary: #242424;
  --text-secondary:#616161;
  --text-muted:   #9e9e9e;
  --text-white:   #ffffff;
  --header-bg:    #6264a7;
  --header-text:  #ffffff;
  --online:       #6bb700;
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.1);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.12);
  --radius:       4px;
  --radius-lg:    8px;
  --radius-msg:   4px;
}
[data-theme="dark"] {
  --bg-app:       #1b1b1b;
  --bg-sidebar:   #1f1f1f;
  --bg-chat:      #1f1f1f;
  --bg-msg-area:  #1b1b1b;
  --bg-input:     #2d2d2d;
  --bg-mine:      #3b3b5c;
  --bg-theirs:    #2d2d2d;
  --border:       #3d3d3d;
  --accent:       #7b83eb;
  --accent-hover: #8a91f0;
  --accent-light: #2a2a40;
  --text-primary: #f3f2f1;
  --text-secondary:#c8c6c4;
  --text-muted:   #8a8886;
  --header-bg:    #292929;
  --header-text:  #f3f2f1;
  --online:       #6bb700;
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.4);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Inter','Segoe UI',sans-serif; background:var(--bg-app); color:var(--text-primary); overflow:hidden; transition:background 0.2s, color 0.2s; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:300;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
  background:var(--bg-app);
}
.spin-ring {
  width:36px; height:36px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--accent);
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { color:var(--text-muted); font-size:0.82rem; }

/* ── ENTRY ── */
#entry {
  position:fixed; inset:0; z-index:200;
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:0;
  background:var(--bg-app);
}
.entry-card {
  background:var(--bg-sidebar); border-radius:var(--radius-lg);
  padding:40px 44px; box-shadow:var(--shadow-md); text-align:center; width:380px;
  border:1px solid var(--border);
}
.entry-brand {
  display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:4px;
}
.entry-brand svg { width:32px; height:32px; }
.entry-brand h1 { font-size:1.35rem; font-weight:600; color:var(--text-primary); }
.entry-sub { color:var(--text-muted); font-size:0.82rem; margin-bottom:28px; }
.entry-label { font-size:0.78rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:14px; }
.gender-cards { display:flex; gap:12px; justify-content:center; }
.gc {
  flex:1; padding:18px 12px; border-radius:var(--radius-lg);
  border:1.5px solid var(--border); background:var(--bg-app);
  cursor:pointer; text-align:center; transition:all 0.18s;
}
.gc:hover { border-color:var(--accent); background:var(--accent-light); }
.gc:hover .gc-label { color:var(--accent); }
.gc .gc-icon { font-size:2rem; display:block; margin-bottom:8px; }
.gc .gc-label { font-size:0.88rem; font-weight:600; color:var(--text-primary); transition:color 0.18s; }
.gc .gc-sub { font-size:0.7rem; color:var(--text-muted); margin-top:3px; }

/* ── APP SHELL ── */
#app { position:fixed; inset:0; z-index:180; display:none; flex-direction:column; }

/* Top bar */
.topbar {
  height:48px; background:var(--header-bg); display:flex; align-items:center;
  padding:0 16px; flex-shrink:0; gap:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.topbar-brand { display:flex; align-items:center; gap:8px; flex:1; }
.topbar-brand svg { width:22px; height:22px; }
.topbar-brand span { font-size:0.95rem; font-weight:600; color:var(--header-text); }
.topbar-actions { display:flex; align-items:center; gap:6px; }
.tb-btn {
  width:32px; height:32px; border-radius:var(--radius); border:none;
  background:transparent; color:var(--header-text); font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s; opacity:0.85;
}
.tb-btn:hover { background:rgba(255,255,255,0.15); opacity:1; }
.theme-toggle {
  width:32px; height:32px; border-radius:var(--radius); border:none;
  background:rgba(255,255,255,0.1); color:var(--header-text); font-size:0.95rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.theme-toggle:hover { background:rgba(255,255,255,0.2); }

/* Main layout */
.app-body { flex:1; display:flex; overflow:hidden; }

/* Sidebar */
.sidebar {
  width:260px; flex-shrink:0; background:var(--bg-sidebar);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
}
.sidebar-header {
  padding:12px 14px 8px; border-bottom:1px solid var(--border);
}
.sidebar-header h3 { font-size:0.82rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; }
.chat-item {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  cursor:pointer; transition:background 0.15s; position:relative;
}
.chat-item:hover { background:var(--accent-light); }
.chat-item.active { background:var(--accent-light); border-left:3px solid var(--accent); }
.ci-av {
  width:36px; height:36px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:0.95rem; color:#fff; font-weight:600; flex-shrink:0; position:relative;
}
.ci-av .presence {
  position:absolute; bottom:0; right:0;
  width:10px; height:10px; border-radius:50%; background:#ccc;
  border:2px solid var(--bg-sidebar);
}
.ci-av .presence.on { background:var(--online); }
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:0.88rem; font-weight:500; color:var(--text-primary); }
.ci-preview { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

/* Chat panel */
.chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Chat header */
.chat-header {
  height:52px; display:flex; align-items:center; gap:10px;
  padding:0 16px; flex-shrink:0;
  background:var(--bg-chat); border-bottom:1px solid var(--border);
}
.ch-av {
  width:32px; height:32px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:0.88rem; color:#fff; flex-shrink:0; position:relative;
}
.ch-av .presence {
  position:absolute; bottom:0; right:0;
  width:9px; height:9px; border-radius:50%; background:#ccc;
  border:2px solid var(--bg-chat);
}
.ch-av .presence.on { background:var(--online); }
.ch-info { flex:1; }
.ch-name { font-size:0.9rem; font-weight:600; color:var(--text-primary); }
.ch-status { font-size:0.72rem; color:var(--text-muted); }
.ch-actions { display:flex; gap:4px; }
.ch-btn {
  width:34px; height:34px; border-radius:var(--radius); border:none;
  background:transparent; color:var(--text-secondary); font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.ch-btn:hover { background:var(--accent-light); color:var(--accent); }

/* Incoming call */
#incoming-call {
  display:none; align-items:center; justify-content:space-between;
  padding:10px 16px; background:var(--accent); flex-shrink:0;
}
#incoming-call.active { display:flex; }
.ic-left { display:flex; align-items:center; gap:10px; color:#fff; font-size:0.85rem; font-weight:500; }
.ic-ring { animation:ring 0.8s infinite; display:inline-block; }
@keyframes ring { 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(12deg)} }
.ic-actions { display:flex; gap:8px; }
.ic-accept {
  padding:6px 18px; border-radius:var(--radius); border:none; cursor:pointer;
  background:#fff; color:var(--accent); font-size:0.8rem; font-weight:600;
  transition:opacity 0.15s;
}
.ic-decline {
  padding:6px 18px; border-radius:var(--radius); border:none; cursor:pointer;
  background:rgba(255,255,255,0.2); color:#fff; font-size:0.8rem; font-weight:600;
  transition:opacity 0.15s;
}
.ic-accept:hover,.ic-decline:hover { opacity:0.85; }

/* Call bar */
#call-bar {
  display:none; align-items:center; justify-content:space-between;
  padding:8px 16px; background:#1a1a2e; flex-shrink:0;
}
#call-bar.active { display:flex; }
.call-bar-left { display:flex; align-items:center; gap:8px; }
.call-dot { width:8px; height:8px; border-radius:50%; background:var(--online); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.call-label { font-size:0.82rem; color:#fff; font-weight:500; }
.call-timer { font-size:0.78rem; color:#aaa; }
.call-actions { display:flex; gap:8px; }
.cb-btn {
  padding:5px 16px; border-radius:var(--radius); border:none; font-size:0.78rem;
  font-family:inherit; cursor:pointer; font-weight:500; transition:opacity 0.15s;
}
.cb-mute { background:#3d3d3d; color:#fff; }
.cb-mute.muted { background:#c50f1f; }
.cb-end { background:#c50f1f; color:#fff; }
.cb-btn:hover { opacity:0.85; }

/* Messages area */
#messages {
  flex:1; overflow-y:auto; padding:16px 20px;
  display:flex; flex-direction:column; gap:2px;
  background:var(--bg-msg-area);
}
#messages::-webkit-scrollbar { width:5px; }
#messages::-webkit-scrollbar-track { background:transparent; }
#messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Date separator */
.date-sep { text-align:center; margin:10px 0; }
.date-sep span {
  font-size:0.72rem; color:var(--text-muted); background:var(--bg-msg-area);
  padding:2px 12px; border-radius:12px; border:1px solid var(--border);
}

/* Message rows */
.msg-group { display:flex; flex-direction:column; margin-bottom:4px; }
.msg-group.mine { align-items:flex-end; }
.msg-group.theirs { align-items:flex-start; }

.msg-meta {
  display:flex; align-items:center; gap:8px; margin-bottom:3px; padding:0 2px;
}
.msg-group.mine .msg-meta { flex-direction:row-reverse; }
.meta-av {
  width:28px; height:28px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:0.78rem; color:#fff; flex-shrink:0;
}
.meta-name { font-size:0.75rem; font-weight:600; color:var(--text-secondary); }

.msg-row { display:flex; max-width:68%; }
.msg-row.mine { align-self:flex-end; }
.msg-row.theirs { align-self:flex-start; }

.bubble {
  padding:8px 12px; border-radius:var(--radius-lg);
  font-size:0.875rem; line-height:1.5;
  word-break:break-word; position:relative;
  box-shadow:var(--shadow-sm);
}
.mine   .bubble { background:var(--bg-mine); border-top-right-radius:2px; }
.theirs .bubble { background:var(--bg-theirs); border-top-left-radius:2px; border:1px solid var(--border); }

.btime { font-size:0.65rem; color:var(--text-muted); margin-top:3px; padding:0 2px; }
.mine   .btime { text-align:right; }
.theirs .btime { text-align:left; }

/* Typing indicator */
.typing-row {
  display:flex; align-items:flex-end; gap:6px; max-width:68%;
  align-self:flex-start; margin-bottom:4px;
}
.typing-bubble {
  padding:10px 14px; border-radius:var(--radius-lg); border-top-left-radius:2px;
  background:var(--bg-theirs); border:1px solid var(--border);
  box-shadow:var(--shadow-sm); display:flex; gap:4px; align-items:center;
}
.typing-dot {
  width:7px; height:7px; border-radius:50%; background:var(--text-muted);
  animation:tdot 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

/* Live typing text (secondary) */
.live-bubble-text {
  padding:8px 12px; border-radius:var(--radius-lg); border-top-left-radius:2px;
  background:var(--bg-theirs); border:1px solid var(--border);
  box-shadow:var(--shadow-sm); font-size:0.875rem; line-height:1.5;
  color:var(--text-muted); font-style:italic; max-width:68%;
  align-self:flex-start;
}
.live-cursor {
  display:inline-block; width:2px; height:0.9em;
  background:var(--text-muted); margin-left:1px;
  animation:blink 0.8s infinite; vertical-align:text-bottom;
}
@keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

/* System messages */
.sys-msg { text-align:center; font-size:0.72rem; color:var(--text-muted); padding:6px 0; }
.sys-msg span { background:var(--bg-msg-area); padding:3px 12px; border-radius:12px; border:1px solid var(--border); }

/* ── INPUT AREA ── */
.input-area {
  padding:10px 16px 12px; flex-shrink:0;
  background:var(--bg-chat); border-top:1px solid var(--border);
}
.input-toolbar {
  display:flex; align-items:center; gap:2px; margin-bottom:6px; padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.tool-btn {
  width:30px; height:28px; border-radius:var(--radius); border:none;
  background:transparent; color:var(--text-secondary); font-size:0.95rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.tool-btn:hover { background:var(--accent-light); color:var(--accent); }
.tool-btn.active { color:var(--accent); background:var(--accent-light); }
.tool-sep { width:1px; height:20px; background:var(--border); margin:0 4px; }
.input-box {
  display:flex; align-items:flex-end; gap:8px;
}
.input-box textarea {
  flex:1; border:none; outline:none; background:transparent;
  font-family:inherit; font-size:0.875rem; color:var(--text-primary);
  resize:none; max-height:120px; line-height:1.5; min-height:24px; padding:0;
}
.input-box textarea::placeholder { color:var(--text-muted); }
.send-btn {
  width:32px; height:32px; border-radius:var(--radius); border:none;
  background:var(--accent); color:#fff; font-size:0.9rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s; margin-bottom:2px;
}
.send-btn:hover { background:var(--accent-hover); }
.send-btn:active { transform:scale(0.94); }

/* Emoji tray */
.emoji-tray {
  position:absolute; bottom:70px; left:16px;
  background:var(--bg-sidebar); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:10px;
  box-shadow:var(--shadow-md);
  display:none; flex-wrap:wrap; gap:3px;
  max-height:180px; overflow-y:auto; width:280px; z-index:10;
}
.emoji-tray.open { display:flex; }
.emoji-tray::-webkit-scrollbar { width:3px; }
.emoji-tray::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.ebtn {
  font-size:1.1rem; background:none; border:none; border-radius:var(--radius);
  padding:4px 5px; cursor:pointer; transition:background 0.1s;
}
.ebtn:hover { background:var(--accent-light); }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--text-primary); color:var(--bg-chat);
  padding:8px 18px; border-radius:var(--radius-lg);
  font-size:0.82rem; z-index:1000;
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:var(--shadow-md); font-weight:500; opacity:0.95;
}
#toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:600px){
  .sidebar { display:none; }
  .msg-row { max-width:90%; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ══ LOADING ══ -->
<div id="loading">
  <div class="spin-ring"></div>
  <p>Loading…</p>
</div>

<!-- ══ ENTRY ══ -->
<div id="entry">
  <div class="entry-card">
    <div class="entry-brand">
      <svg viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="4" fill="#6264a7"/>
        <path d="M7 8h10M7 12h7M7 16h5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <h1>Velvet Chat</h1>
    </div>
    <p class="entry-sub">Private · Secure · Real-time</p>
    <div class="entry-label">Sign in as</div>
    <div class="gender-cards">
      <div class="gc" onclick="choose('male')">
        <span class="gc-icon">👨</span>
        <div class="gc-label">He / Him</div>
        <div class="gc-sub">Continue as King</div>
      </div>
      <div class="gc" onclick="choose('female')">
        <span class="gc-icon">👩</span>
        <div class="gc-label">She / Her</div>
        <div class="gc-sub">Continue as Queen</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="4" fill="rgba(255,255,255,0.2)"/>
        <path d="M7 8h10M7 12h7M7 16h5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Velvet Chat</span>
    </div>
    <div class="topbar-actions">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </div>

  <!-- App body -->
  <div class="app-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Chat</h3>
      </div>
      <div class="chat-item active" id="sidebar-item">
        <div class="ci-av" id="sidebar-av">
          ?
          <span class="presence" id="sidebar-presence"></span>
        </div>
        <div class="ci-info">
          <div class="ci-name" id="sidebar-name">Partner</div>
          <div class="ci-preview" id="sidebar-preview">No messages yet</div>
        </div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel">

      <!-- Chat header -->
      <div class="chat-header">
        <div class="ch-av" id="ch-av">
          ?
          <span class="presence" id="ch-presence"></span>
        </div>
        <div class="ch-info">
          <div class="ch-name" id="ch-name">Partner</div>
          <div class="ch-status" id="ch-status">Offline</div>
        </div>
        <div class="ch-actions">
          <button class="ch-btn" onclick="startCall()" title="Audio call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.06 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </button>
          <button class="ch-btn" onclick="clearChat()" title="Clear chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Incoming call -->
      <div id="incoming-call">
        <div class="ic-left">
          <span class="ic-ring">📞</span>
          <span>Incoming audio call…</span>
        </div>
        <div class="ic-actions">
          <button class="ic-accept" onclick="acceptCall()">Accept</button>
          <button class="ic-decline" onclick="declineCall()">Decline</button>
        </div>
      </div>

      <!-- Call bar -->
      <div id="call-bar">
        <div class="call-bar-left">
          <span class="call-dot"></span>
          <span class="call-label">Audio call</span>
          <span class="call-timer" id="call-timer">00:00</span>
        </div>
        <div class="call-actions">
          <button class="cb-btn cb-mute" id="mute-btn" onclick="toggleMute()">Mute</button>
          <button class="cb-btn cb-end" onclick="endCall()">End call</button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Input -->
      <div class="input-area" style="position:relative;">
        <div class="emoji-tray" id="emoji-tray"></div>
        <div class="input-toolbar">
          <button class="tool-btn" id="etoggle" onclick="toggleEmoji()" title="Emoji">😊</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" title="Bold" onclick="insertFormat('**')"><b>B</b></button>
          <button class="tool-btn" title="Italic" onclick="insertFormat('_')"><i>I</i></button>
        </div>
        <div class="input-box">
          <textarea id="msg-input" rows="1"
            placeholder="Type a new message"
            onkeydown="handleKey(event)"
            oninput="autoResize(this); broadcastLiveTyping();"></textarea>
          <button class="send-btn" onclick="sendMsg()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

    </div><!-- end chat-panel -->
  </div><!-- end app-body -->
</div><!-- end app -->

<audio id="remote-audio" autoplay playsinline></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue, onDisconnect, serverTimestamp, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBF4DHE8jfSGGYVRf9W9MvFwEfW0lZ-jw",
  authDomain: "chatapp-7afcc.firebaseapp.com",
  projectId: "chatapp-7afcc",
  storageBucket: "chatapp-7afcc.firebasestorage.app",
  messagingSenderId: "444203743042",
  appId: "1:444203743042:web:362f75c7fb8aa501463adb",
  databaseURL: "https://chatapp-7afcc-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const EMOJIS = [
  '😊','😄','😂','🤣','😍','😘','😏','😈','🥵','🔥',
  '❤️','💕','💞','😻','🍒','🍓','🌹','🌸','💐','🥂',
  '🎀','🎁','💎','💦','🥰','😜','🤭','😩','✨','⭐',
  '💅','👑','🍾','🌙','💏','👫','❤️‍🔥','🫂','🩷','💜',
  '💙','🤍','🖤','💪','🙈','😳','🤫','😋','🥴','😵',
  '🤩','🫰','🤙','💯','🎯','🔑','🛏️','🍫','👍','🙌',
];

let myGender = null, partnerOn = false;
let renderedKeys = new Set();
let liveTypingEl = null, liveTypingTimer = null, sendStopTimer = null;
let pc = null, localStream = null;
let callTimerInt = null, callSeconds = 0, isMuted = false, inCall = false, isCallerRole = false;
let lastPreview = 'No messages yet';

const STUN = { iceServers:[{ urls:'stun:stun.l.google.com:19302' }] };

// ── Init ──────────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('entry').style.display = 'flex';
  buildEmojiTray();
}, 600);

// ── Theme toggle ──────────────────────────────────────────────
window.toggleTheme = function() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
};

// ── Choose gender ─────────────────────────────────────────────
window.choose = function(gender) {
  myGender = gender;
  document.getElementById('entry').style.display = 'none';
  setupUI();
  document.getElementById('app').style.display = 'flex';

  const other = gender === 'male' ? 'female' : 'male';
  const presRef = ref(db, `presence/${gender}`);
  set(presRef, { online:true, ts:serverTimestamp() });
  onDisconnect(presRef).set({ online:false, ts:serverTimestamp() });

  onValue(ref(db, `presence/${other}`), snap => {
    const v = snap.val();
    if (v && v.online) { if (!partnerOn) onPartnerJoined(); }
    else { if (partnerOn) onPartnerLeft(); }
  });

  onValue(ref(db, 'messages'), snap => {
    snap.forEach(child => {
      if (!renderedKeys.has(child.key)) {
        renderedKeys.add(child.key);
        const msg = child.val();
        renderMsg(msg, msg.gender === myGender);
        lastPreview = (msg.gender === myGender ? 'You: ' : '') + msg.text.slice(0,30);
        document.getElementById('sidebar-preview').textContent = lastPreview;
      }
    });
  });

  onValue(ref(db, `livetyping/${other}`), snap => {
    const val = snap.val();
    if (val && val.text !== undefined && val.text !== '') showLiveTyping(val.text);
    else hideLiveTyping();
  });

  onValue(ref(db, `calls/${gender}`), snap => {
    const v = snap.val();
    if (!v) return;
    if (v.type === 'offer' && !inCall) showIncomingCall(v);
    else if (v.type === 'answer' && isCallerRole) handleAnswer(v.sdp);
    else if (v.type === 'ice-candidate') handleRemoteIce(v.candidate);
    else if (v.type === 'end') endCallCleanup();
  });
};

function other() { return myGender === 'male' ? 'female' : 'male'; }

function setupUI() {
  const parEmoji = myGender === 'male' ? '👩' : '👨';
  const parLabel = myGender === 'male' ? 'She / Her' : 'He / Him';
  document.getElementById('sidebar-av').childNodes[0].textContent = parEmoji;
  document.getElementById('sidebar-name').textContent = parLabel;
  document.getElementById('ch-av').childNodes[0].textContent = parEmoji;
  document.getElementById('ch-name').textContent = parLabel;
}

// ── Partner status ────────────────────────────────────────────
function onPartnerJoined() {
  partnerOn = true;
  ['ch-presence','sidebar-presence'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'presence on';
  });
  document.getElementById('ch-status').textContent = 'Available';
  showToast('Partner is online');
}

function onPartnerLeft() {
  partnerOn = false;
  ['ch-presence','sidebar-presence'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'presence';
  });
  document.getElementById('ch-status').textContent = 'Offline — message will be delivered';
  hideLiveTyping();
  if (inCall) endCall();
}

// ── Send message ──────────────────────────────────────────────
window.sendMsg = async function() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  set(ref(db, `livetyping/${myGender}`), { text:'', ts:Date.now() });
  await push(ref(db, 'messages'), { gender:myGender, text, time:Date.now() });
  inp.value = ''; autoResize(inp);
};

// ── Live typing ───────────────────────────────────────────────
window.broadcastLiveTyping = function() {
  if (!myGender) return;
  const text = document.getElementById('msg-input').value;
  set(ref(db, `livetyping/${myGender}`), { text, ts:Date.now() });
  clearTimeout(sendStopTimer);
  sendStopTimer = setTimeout(() => set(ref(db,`livetyping/${myGender}`),{text:'',ts:Date.now()}), 8000);
};

function showLiveTyping(text) {
  const messages = document.getElementById('messages');
  if (!liveTypingEl) {
    liveTypingEl = document.createElement('div');
    liveTypingEl.className = 'live-bubble-text';
    liveTypingEl.id = 'live-bubble-text';
    messages.appendChild(liveTypingEl);
  }
  liveTypingEl.innerHTML = escapeHtml(text) + '<span class="live-cursor"></span>';
  messages.scrollTop = messages.scrollHeight;
  clearTimeout(liveTypingTimer);
  liveTypingTimer = setTimeout(hideLiveTyping, 10000);
}

function hideLiveTyping() {
  if (liveTypingEl) { liveTypingEl.remove(); liveTypingEl = null; }
  clearTimeout(liveTypingTimer);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── Render message ────────────────────────────────────────────
let lastRenderedGender = null;

function renderMsg(msg, isMine) {
  hideLiveTyping();
  const messages = document.getElementById('messages');
  const sameAuthor = lastRenderedGender === msg.gender;
  lastRenderedGender = msg.gender;

  if (!sameAuthor) {
    const group = document.createElement('div');
    group.className = 'msg-group ' + (isMine ? 'mine' : 'theirs');

    const meta = document.createElement('div');
    meta.className = 'msg-meta';

    const av = document.createElement('div');
    av.className = 'meta-av';
    av.textContent = msg.gender === 'male' ? '👨' : '👩';

    const name = document.createElement('div');
    name.className = 'meta-name';
    name.textContent = isMine ? 'You' : (msg.gender === 'male' ? 'He / Him' : 'She / Her');

    if (isMine) { meta.appendChild(name); meta.appendChild(av); }
    else        { meta.appendChild(av);   meta.appendChild(name); }

    group.appendChild(meta);
    messages.appendChild(group);
  }

  const row    = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.textContent = msg.text;
  const btime  = document.createElement('div'); btime.className = 'btime';
  btime.textContent = new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  row.appendChild(bubble);
  messages.appendChild(row);
  messages.appendChild(Object.assign(document.createElement('div'), { className:'btime ' + (isMine?'mine':'theirs'), textContent: new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }));
  messages.scrollTop = messages.scrollHeight;
}

function addSysMsg(txt) {
  const d = document.createElement('div'); d.className = 'sys-msg';
  d.innerHTML = `<span>${txt}</span>`;
  document.getElementById('messages').appendChild(d);
  document.getElementById('messages').scrollTop = 99999;
}

// ── Clear chat ────────────────────────────────────────────────
window.clearChat = async function() {
  if (!confirm('Clear all messages? This cannot be undone.')) return;
  await remove(ref(db, 'messages'));
  await set(ref(db,'livetyping/male'),{text:'',ts:Date.now()});
  await set(ref(db,'livetyping/female'),{text:'',ts:Date.now()});
  renderedKeys.clear(); lastRenderedGender = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('sidebar-preview').textContent = 'No messages yet';
  showToast('Chat cleared');
};

// ── Insert format ─────────────────────────────────────────────
window.insertFormat = function(mark) {
  const inp = document.getElementById('msg-input');
  const s = inp.selectionStart, e = inp.selectionEnd;
  const sel = inp.value.slice(s,e) || 'text';
  inp.value = inp.value.slice(0,s) + mark + sel + mark + inp.value.slice(e);
  inp.focus(); autoResize(inp);
};

// ══════════════════════════════════════════════════════════════
// ── WebRTC AUDIO CALL ─────────────────────────────────────────
// ══════════════════════════════════════════════════════════════

window.startCall = async function() {
  if (!partnerOn) { showToast('Partner is offline'); return; }
  if (inCall) return;
  isCallerRole = true;
  await setupPeerConnection();
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await set(ref(db,`calls/${other()}`), { type:'offer', sdp:offer.sdp, from:myGender });
  showToast('Calling…');
};

function showIncomingCall(v) {
  document.getElementById('incoming-call').classList.add('active');
  window._pendingOffer = v;
}

window.acceptCall = async function() {
  document.getElementById('incoming-call').classList.remove('active');
  isCallerRole = false;
  await setupPeerConnection();
  const offer = window._pendingOffer;
  await pc.setRemoteDescription({ type:'offer', sdp:offer.sdp });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await set(ref(db,`calls/${other()}`), { type:'answer', sdp:answer.sdp });
  startCallUI();
};

window.declineCall = async function() {
  document.getElementById('incoming-call').classList.remove('active');
  await set(ref(db,`calls/${other()}`), { type:'end' });
  await remove(ref(db,`calls/${myGender}`));
};

async function handleAnswer(sdp) {
  if (!pc) return;
  await pc.setRemoteDescription({ type:'answer', sdp });
  startCallUI();
}

async function handleRemoteIce(candidate) {
  if (!pc || !candidate) return;
  try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
}

async function setupPeerConnection() {
  localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  pc = new RTCPeerConnection(STUN);
  pc.onicecandidate = e => {
    if (e.candidate) set(ref(db,`calls/${other()}`),{type:'ice-candidate',candidate:e.candidate.toJSON()});
  };
  pc.ontrack = e => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
  pc.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(pc.connectionState)) endCallCleanup();
  };
}

function startCallUI() {
  inCall = true;
  document.getElementById('call-bar').classList.add('active');
  callSeconds = 0;
  callTimerInt = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s = String(callSeconds%60).padStart(2,'0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}

window.toggleMute = function() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById('mute-btn');
  btn.textContent = isMuted ? 'Unmute' : 'Mute';
  btn.classList.toggle('muted', isMuted);
};

window.endCall = async function() {
  await set(ref(db,`calls/${other()}`),{type:'end'});
  await remove(ref(db,`calls/${myGender}`));
  endCallCleanup();
};

function endCallCleanup() {
  inCall = false; isCallerRole = false; isMuted = false;
  clearInterval(callTimerInt);
  document.getElementById('call-bar').classList.remove('active');
  document.getElementById('incoming-call').classList.remove('active');
  document.getElementById('mute-btn').textContent = 'Mute';
  document.getElementById('mute-btn').classList.remove('muted');
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  remove(ref(db,`calls/${myGender}`));
}

// ── Emoji ─────────────────────────────────────────────────────
function buildEmojiTray() {
  const tray = document.getElementById('emoji-tray');
  EMOJIS.forEach(e => {
    const b = document.createElement('button'); b.className='ebtn'; b.textContent=e;
    b.onclick = () => {
      const inp = document.getElementById('msg-input');
      const p = inp.selectionStart;
      inp.value = inp.value.slice(0,p)+e+inp.value.slice(inp.selectionEnd);
      inp.selectionStart = inp.selectionEnd = p+e.length;
      inp.focus(); autoResize(inp); broadcastLiveTyping();
    };
    tray.appendChild(b);
  });
}
window.toggleEmoji = function() {
  document.getElementById('emoji-tray').classList.toggle('open');
  document.getElementById('etoggle').classList.toggle('active');
};

// ── Utils ─────────────────────────────────────────────────────
window.handleKey  = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
window.autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'),3000);
}
window.showToast = showToast;

window.addEventListener('beforeunload', ()=>{
  if (myGender) {
    set(ref(db,`livetyping/${myGender}`),{text:'',ts:Date.now()});
    set(ref(db,`presence/${myGender}`),{online:false,ts:Date.now()});
    if (inCall) endCall();
  }
});
</script>
</body>
</html>
