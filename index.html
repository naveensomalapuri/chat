<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Velvet Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:          #17212b;
  --bg2:         #0e1621;
  --surface:     #1c2733;
  --surface2:    #242f3d;
  --border:      #2b3c4d;
  --accent:      #5288c1;
  --accent2:     #6ea3d8;
  --mine-bg:     #2b5278;
  --theirs-bg:   #1c2733;
  --text:        #f5f5f5;
  --text2:       #aab8c2;
  --text3:       #6d8fa8;
  --online:      #4dcd5e;
  --header:      #17212b;
  --input-bg:    #1c2733;
  --shadow:      rgba(0,0,0,0.35);
}
[data-theme="light"] {
  --bg:          #f4f4f5;
  --bg2:         #e4e6eb;
  --surface:     #ffffff;
  --surface2:    #f0f2f5;
  --border:      #dde1e7;
  --accent:      #2481cc;
  --accent2:     #3a96e0;
  --mine-bg:     #effdde;
  --theirs-bg:   #ffffff;
  --text:        #000000;
  --text2:       #5a5f66;
  --text3:       #9ca3af;
  --online:      #31a24c;
  --header:      #ffffff;
  --input-bg:    #ffffff;
  --shadow:      rgba(0,0,0,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:'Inter',sans-serif; background:var(--bg2); color:var(--text); overflow:hidden; transition:background 0.2s,color 0.2s; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:300;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
  background:var(--bg2);
}
.spin-ring {
  width:38px; height:38px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--accent);
  animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p { color:var(--text3); font-size:0.82rem; }

/* ── ENTRY ── */
#entry {
  position:fixed; inset:0; z-index:200;
  display:none; align-items:center; justify-content:center;
  background:var(--bg2);
}
.entry-card {
  background:var(--surface); border-radius:16px;
  padding:36px 32px; width:min(360px,92vw);
  box-shadow:0 8px 32px var(--shadow); text-align:center;
  border:1px solid var(--border);
}
.entry-logo { margin-bottom:6px; }
.entry-logo .logo-circle {
  width:64px; height:64px; border-radius:50%; background:var(--accent);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:1.8rem; margin-bottom:12px;
  box-shadow:0 4px 16px rgba(82,136,193,0.4);
}
.entry-logo h1 { font-size:1.4rem; font-weight:700; color:var(--text); }
.entry-logo p { font-size:0.8rem; color:var(--text3); margin-top:4px; margin-bottom:24px; }
.entry-divider {
  display:flex; align-items:center; gap:10px; margin-bottom:18px;
}
.entry-divider::before,.entry-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.entry-divider span { font-size:0.72rem; color:var(--text3); white-space:nowrap; text-transform:uppercase; letter-spacing:0.08em; }
.gender-cards { display:flex; gap:12px; }
.gc {
  flex:1; padding:18px 10px; border-radius:12px;
  border:1.5px solid var(--border); background:var(--surface2);
  cursor:pointer; text-align:center; transition:all 0.18s; user-select:none;
}
.gc:hover,.gc:active { border-color:var(--accent); background:var(--bg); transform:translateY(-2px); box-shadow:0 4px 14px var(--shadow); }
.gc .gc-icon { font-size:2rem; display:block; margin-bottom:8px; }
.gc .gc-label { font-size:0.875rem; font-weight:600; color:var(--text); }
.gc .gc-sub { font-size:0.7rem; color:var(--text3); margin-top:3px; }

/* ── APP SHELL ── */
#app { position:fixed; inset:0; z-index:180; display:none; }

/* Layout: sidebar + chat */
.app-layout { display:flex; height:100%; }

/* ── SIDEBAR ── */
.sidebar {
  width:260px; flex-shrink:0; display:flex; flex-direction:column;
  background:var(--surface); border-right:1px solid var(--border);
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
}
.sidebar-header {
  height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:var(--header); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-header h2 { font-size:1.1rem; font-weight:700; color:var(--text); }
.sidebar-header-actions { display:flex; gap:4px; }
.hdr-btn {
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; color:var(--text2); font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.hdr-btn:hover { background:var(--surface2); }

.search-box {
  padding:8px 12px; flex-shrink:0;
}
.search-box input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:7px 14px; font-size:0.83rem;
  color:var(--text); outline:none; font-family:inherit;
  transition:border-color 0.15s;
}
.search-box input::placeholder { color:var(--text3); }
.search-box input:focus { border-color:var(--accent); }

.contact-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer; transition:background 0.15s;
  border-radius:8px; margin:0 6px 2px;
}
.contact-item:hover { background:var(--surface2); }
.contact-item.active { background:var(--bg); }
.ci-av {
  width:42px; height:42px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0; position:relative;
}
.presence-dot {
  position:absolute; bottom:1px; right:1px;
  width:11px; height:11px; border-radius:50%;
  background:var(--border); border:2px solid var(--surface);
  transition:background 0.3s;
}
.presence-dot.on { background:var(--online); }
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:0.88rem; font-weight:600; color:var(--text); }
.ci-preview { font-size:0.75rem; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.ci-time { font-size:0.68rem; color:var(--text3); flex-shrink:0; align-self:flex-start; margin-top:2px; }

/* ── CHAT PANEL ── */
.chat-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg);
}

/* Chat header */
.chat-header {
  height:56px; display:flex; align-items:center; gap:10px;
  padding:0 14px; flex-shrink:0;
  background:var(--header); border-bottom:1px solid var(--border);
}
.back-btn {
  display:none; width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; color:var(--text2); font-size:1.1rem;
  cursor:pointer; align-items:center; justify-content:center;
  transition:background 0.15s; flex-shrink:0;
}
.back-btn:hover { background:var(--surface2); }
.ch-av {
  width:36px; height:36px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0; position:relative;
}
.ch-av .presence-dot { border-color:var(--header); }
.ch-info { flex:1; }
.ch-name { font-size:0.92rem; font-weight:600; color:var(--text); }
.ch-status { font-size:0.72rem; color:var(--text3); margin-top:1px; }
.ch-status.on { color:var(--online); }
.ch-actions { display:flex; gap:2px; }
.ch-btn {
  width:36px; height:36px; border-radius:50%; border:none;
  background:transparent; color:var(--text2); font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
.ch-btn:hover { background:var(--surface2); }

/* Incoming call */
#incoming-call {
  display:none; align-items:center; justify-content:space-between;
  padding:10px 16px; background:var(--accent); flex-shrink:0;
  animation:slideDown 0.25s ease;
}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
#incoming-call.active { display:flex; }
.ic-left { display:flex; align-items:center; gap:10px; color:#fff; font-size:0.85rem; font-weight:500; }
.ic-ring { animation:ring 0.7s infinite; display:inline-block; }
@keyframes ring{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
.ic-actions { display:flex; gap:8px; }
.ic-btn {
  padding:6px 18px; border-radius:20px; border:none; cursor:pointer;
  font-size:0.8rem; font-weight:600; font-family:inherit; transition:opacity 0.15s;
}
.ic-accept { background:#fff; color:var(--accent); }
.ic-decline { background:rgba(255,255,255,0.2); color:#fff; }
.ic-btn:hover { opacity:0.85; }

/* Call bar */
#call-bar {
  display:none; align-items:center; justify-content:space-between;
  padding:8px 16px; background:#1a2744; flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#call-bar.active { display:flex; }
.cb-left { display:flex; align-items:center; gap:8px; }
.cb-pulse { width:8px; height:8px; border-radius:50%; background:var(--online); animation:cbpulse 1.5s infinite; }
@keyframes cbpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.2)}}
.cb-info { font-size:0.82rem; color:#c8d6e5; font-weight:500; }
.cb-timer { font-size:0.75rem; color:#8a9bb0; margin-left:6px; }
.cb-actions { display:flex; gap:8px; }
.cbb {
  padding:5px 16px; border-radius:20px; border:none;
  font-size:0.78rem; font-family:inherit; font-weight:500; cursor:pointer;
  transition:opacity 0.15s;
}
.cbb:hover { opacity:0.82; }
.cbb-mute { background:#2e4a6e; color:#c8d6e5; }
.cbb-mute.muted { background:#c50f1f; color:#fff; }
.cbb-end { background:#c50f1f; color:#fff; }

/* Messages */
#messages {
  flex:1; overflow-y:auto; padding:12px 12px 8px;
  display:flex; flex-direction:column; gap:2px;
  background:var(--bg);
}
#messages::-webkit-scrollbar { width:4px; }
#messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.msg-wrap {
  display:flex; flex-direction:column;
  animation:msgIn 0.2s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-wrap.mine   { align-items:flex-end; }
.msg-wrap.theirs { align-items:flex-start; }

.bubble {
  max-width:min(68%, 420px);
  padding:8px 12px; border-radius:16px;
  font-size:0.875rem; line-height:1.5;
  word-break:break-word; position:relative;
  box-shadow:0 1px 3px var(--shadow);
}
.mine   .bubble { background:var(--mine-bg); border-bottom-right-radius:4px; }
.theirs .bubble { background:var(--theirs-bg); border-bottom-left-radius:4px; border:1px solid var(--border); }

.bubble-meta {
  display:flex; align-items:center; gap:6px; margin-top:2px; padding:0 4px;
}
.msg-wrap.mine   .bubble-meta { justify-content:flex-end; }
.msg-wrap.theirs .bubble-meta { justify-content:flex-start; }
.btime { font-size:0.65rem; color:var(--text3); }

/* Sender name (first message in group) */
.sender-name {
  font-size:0.72rem; font-weight:600; color:var(--accent2);
  padding:0 4px; margin-bottom:2px;
}

/* Live typing */
.typing-row {
  display:flex; align-items:flex-end; gap:6px;
  max-width:min(68%,420px); align-self:flex-start; margin-top:2px;
}
.typing-bubble {
  padding:10px 14px; border-radius:16px; border-bottom-left-radius:4px;
  background:var(--theirs-bg); border:1px solid var(--border);
  box-shadow:0 1px 3px var(--shadow);
  display:flex; gap:5px; align-items:center;
}
.td {
  width:7px; height:7px; border-radius:50%; background:var(--text3);
  animation:tdot 1.4s infinite;
}
.td:nth-child(2){animation-delay:0.2s}
.td:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-5px);opacity:1}}

/* System */
.sys-msg { text-align:center; padding:6px 0; }
.sys-msg span {
  font-size:0.72rem; color:var(--text3);
  background:var(--surface); padding:3px 12px; border-radius:10px;
  border:1px solid var(--border);
}

/* ── INPUT ── */
.input-area {
  padding:8px 12px 10px; flex-shrink:0;
  background:var(--header); border-top:1px solid var(--border);
  position:relative;
}
.emoji-tray {
  position:absolute; bottom:calc(100% + 4px); left:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:10px; box-shadow:0 4px 20px var(--shadow);
  display:none; flex-wrap:wrap; gap:3px;
  max-height:190px; overflow-y:auto; width:min(300px,calc(100vw - 24px));
  z-index:20;
}
.emoji-tray.open { display:flex; }
.emoji-tray::-webkit-scrollbar { width:3px; }
.emoji-tray::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.ebtn {
  font-size:1.15rem; background:none; border:none; border-radius:6px;
  padding:4px 5px; cursor:pointer; transition:background 0.1s; line-height:1;
}
.ebtn:hover { background:var(--surface2); }

.input-row { display:flex; align-items:flex-end; gap:8px; }
.input-inner {
  flex:1; display:flex; align-items:flex-end; gap:6px;
  background:var(--input-bg); border-radius:22px;
  border:1px solid var(--border); padding:8px 12px;
  transition:border-color 0.15s;
}
.input-inner:focus-within { border-color:var(--accent); }
.emoji-btn {
  width:28px; height:28px; border:none; background:transparent;
  color:var(--text3); font-size:1.15rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; border-radius:50%; transition:color 0.15s;
}
.emoji-btn:hover { color:var(--accent); }
.emoji-btn.active { color:var(--accent); }
.input-inner textarea {
  flex:1; border:none; outline:none; background:transparent;
  font-family:inherit; font-size:0.875rem; color:var(--text);
  resize:none; max-height:120px; line-height:1.5; min-height:22px; padding:0;
}
.input-inner textarea::placeholder { color:var(--text3); }
.send-btn {
  width:42px; height:42px; border-radius:50%; border:none;
  background:var(--accent); color:#fff;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.18s; box-shadow:0 2px 8px rgba(82,136,193,0.4);
}
.send-btn:hover { background:var(--accent2); transform:scale(1.06); }
.send-btn:active { transform:scale(0.94); }
.send-btn svg { width:18px; height:18px; margin-left:2px; }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface); color:var(--text);
  padding:9px 18px; border-radius:10px; font-size:0.82rem;
  z-index:1000; opacity:0; pointer-events:none;
  transition:opacity 0.25s, transform 0.25s;
  box-shadow:0 4px 16px var(--shadow); font-weight:500;
  border:1px solid var(--border);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── MOBILE ── */
@media(max-width:640px){
  .sidebar {
    position:fixed; inset:0; z-index:50; width:100%;
    transform:translateX(0);
  }
  .sidebar.hidden { transform:translateX(-100%); }
  .chat-panel { width:100%; }
  .back-btn { display:flex !important; }
  .bubble { max-width:82%; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- LOADING -->
<div id="loading">
  <div class="spin-ring"></div>
  <p>Connecting…</p>
</div>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-card">
    <div class="entry-logo">
      <div class="logo-circle">✈️</div>
      <h1>Velvet Chat</h1>
      <p>Private · Real-time · Secure</p>
    </div>
    <div class="entry-divider"><span>Sign in as</span></div>
    <div class="gender-cards">
      <div class="gc" onclick="choose('male')">
        <span class="gc-icon">👨</span>
        <div class="gc-label">He / Him</div>
        <div class="gc-sub">Continue</div>
      </div>
      <div class="gc" onclick="choose('female')">
        <span class="gc-icon">👩</span>
        <div class="gc-label">She / Her</div>
        <div class="gc-sub">Continue</div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <div class="sidebar-header-actions">
          <button class="hdr-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
        </div>
      </div>
      <div class="search-box">
        <input type="text" placeholder="🔍  Search"/>
      </div>
      <div class="contact-item active" id="contact-item" onclick="openChat()">
        <div class="ci-av" id="ci-av">
          👩
          <span class="presence-dot" id="ci-presence"></span>
        </div>
        <div class="ci-info">
          <div class="ci-name" id="ci-name">Partner</div>
          <div class="ci-preview" id="ci-preview">No messages yet</div>
        </div>
        <div class="ci-time" id="ci-time"></div>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chat-panel">

      <div class="chat-header">
        <button class="back-btn" id="back-btn" onclick="showSidebar()">‹</button>
        <div class="ch-av" id="ch-av">
          👩
          <span class="presence-dot" id="ch-presence"></span>
        </div>
        <div class="ch-info">
          <div class="ch-name" id="ch-name">Partner</div>
          <div class="ch-status" id="ch-status">offline</div>
        </div>
        <div class="ch-actions">
          <button class="ch-btn" onclick="startCall()" title="Voice call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.06 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </button>
          <button class="ch-btn" id="sound-btn" onclick="toggleSound()" title="Message sound">🔔</button>
          <button class="ch-btn" onclick="clearChat()" title="Clear chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Incoming call -->
      <div id="incoming-call">
        <div class="ic-left">
          <span class="ic-ring">📞</span>
          <span>Incoming voice call…</span>
        </div>
        <div class="ic-actions">
          <button class="ic-btn ic-accept" onclick="acceptCall()">Accept</button>
          <button class="ic-btn ic-decline" onclick="declineCall()">Decline</button>
        </div>
      </div>

      <!-- Call bar -->
      <div id="call-bar">
        <div class="cb-left">
          <span class="cb-pulse"></span>
          <span class="cb-info">Voice call</span>
          <span class="cb-timer" id="call-timer">00:00</span>
        </div>
        <div class="cb-actions">
          <button class="cbb cbb-mute" id="mute-btn" onclick="toggleMute()">Mute</button>
          <button class="cbb cbb-end" onclick="endCall()">End</button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Input -->
      <div class="input-area">
        <div class="emoji-tray" id="emoji-tray"></div>
        <div class="input-row">
          <div class="input-inner">
            <button class="emoji-btn" id="etoggle" onclick="toggleEmoji()">😊</button>
            <textarea id="msg-input" rows="1"
              placeholder="Write a message…"
              onkeydown="handleKey(event)"
              oninput="autoResize(this);broadcastLiveTyping()"></textarea>
          </div>
          <button class="send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue, onDisconnect, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

const EMOJIS = [
  '😊','😄','😂','🤣','😍','😘','😏','😈','🥵','🔥',
  '❤️','💕','💞','😻','🍒','🍓','🌹','🌸','💐','🥂',

  '💙','🤍','🖤','💪','🙈','😳','🤫','😋','🥴','😵',

];

let myGender=null, partnerOn=false;
let renderedKeys=new Set(), lastGender=null;
let liveTypingEl=null, liveTypingTimer=null, sendStopTimer=null;
let pc=null, localStream=null;
let callTimerInt=null, callSeconds=0, isMuted=false, inCall=false, isCallerRole=false;
let soundOn=true;

// Audio context for notification sound
function playMsgSound(){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+0.1);
    g.gain.setValueAtTime(0.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.3);
  }catch(e){}
}

window.toggleSound=function(){
  soundOn=!soundOn;
  document.getElementById('sound-btn').textContent=soundOn?'🔔':'🔕';
  showToast(soundOn?'Sound on':'Sound off');
};

function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function sendBrowserNotif(text,fromGender){
  if(!soundOn)return;
  if(document.visibilityState==='visible')return;
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('Velvet Chat',{
      body:text,
      icon:'https://em-content.zobj.net/source/google/413/speech-balloon_1f4ac.png'
    });
  }
}

const STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};
const other=()=>myGender==='male'?'female':'male';

// Init
setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('entry').style.display='flex';
  buildEmojiTray();
},600);

// Theme
window.toggleTheme=function(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
};

// Mobile nav
window.openChat=function(){
  if(window.innerWidth<=640){
    document.getElementById('sidebar').classList.add('hidden');
  }
};
window.showSidebar=function(){
  document.getElementById('sidebar').classList.remove('hidden');
};

// Choose
window.choose=function(gender){
  myGender=gender;
  document.getElementById('entry').style.display='none';
  document.getElementById('app').style.display='block';
  setupUI();
  if(window.innerWidth<=640) document.getElementById('sidebar').classList.add('hidden');

  requestNotifPermission();
  const presRef=ref(db,`presence/${gender}`);
  set(presRef,{online:true,ts:serverTimestamp()});
  onDisconnect(presRef).set({online:false,ts:serverTimestamp()});

  onValue(ref(db,`presence/${other()}`),snap=>{
    const v=snap.val();
    if(v&&v.online){if(!partnerOn)onPartnerJoined();}
    else{if(partnerOn)onPartnerLeft();}
  });

  onValue(ref(db,'messages'),snap=>{
    snap.forEach(child=>{
      if(!renderedKeys.has(child.key)){
        renderedKeys.add(child.key);
        const msg=child.val();
        const isMine=msg.gender===myGender;
        renderMsg(msg,isMine);
        if(!isMine){
          playMsgSound();
          sendBrowserNotif(msg.text,msg.gender);
        }
        const prev=(isMine?'You: ':'')+msg.text.slice(0,32)+(msg.text.length>32?'…':'');
        document.getElementById('ci-preview').textContent=prev;
        document.getElementById('ci-time').textContent=fmtTime(msg.time);
      }
    });
  });

  onValue(ref(db,`livetyping/${other()}`),snap=>{
    const v=snap.val();
    if(v&&v.text)showLiveTyping(v.text);
    else hideLiveTyping();
  });

  onValue(ref(db,`calls/${gender}`),snap=>{
    const v=snap.val();
    if(!v)return;
    if(v.type==='offer'&&!inCall)showIncomingCall(v);
    else if(v.type==='answer'&&isCallerRole)handleAnswer(v.sdp);
    else if(v.type==='ice-candidate')handleRemoteIce(v.candidate);
    else if(v.type==='end')endCallCleanup();
  });
};

function setupUI(){
  const parEmoji=myGender==='male'?'👩':'👨';
  const parLabel=myGender==='male'?'She / Her':'He / Him';
  ['ci-av','ch-av'].forEach(id=>{
    const el=document.getElementById(id);
    el.childNodes[0].textContent=parEmoji;
  });
  document.getElementById('ci-name').textContent=parLabel;
  document.getElementById('ch-name').textContent=parLabel;
}

function onPartnerJoined(){
  partnerOn=true;
  ['ci-presence','ch-presence'].forEach(id=>document.getElementById(id).className='presence-dot on');
  document.getElementById('ch-status').textContent='online';
  document.getElementById('ch-status').className='ch-status on';
  showToast('Partner is online');
}
function onPartnerLeft(){
  partnerOn=false;
  ['ci-presence','ch-presence'].forEach(id=>document.getElementById(id).className='presence-dot');
  document.getElementById('ch-status').textContent='offline — message will be delivered';
  document.getElementById('ch-status').className='ch-status';
  hideLiveTyping();
  if(inCall)endCall();
}

// Send
window.sendMsg=async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text)return;
  set(ref(db,`livetyping/${myGender}`),{text:'',ts:Date.now()});
  await push(ref(db,'messages'),{gender:myGender,text,time:Date.now()});
  inp.value='';autoResize(inp);
  if(!partnerOn) showToast('Message sent — delivered when partner comes online');
};

// Live typing
window.broadcastLiveTyping=function(){
  if(!myGender)return;
  const text=document.getElementById('msg-input').value;
  set(ref(db,`livetyping/${myGender}`),{text,ts:Date.now()});
  clearTimeout(sendStopTimer);
  sendStopTimer=setTimeout(()=>set(ref(db,`livetyping/${myGender}`),{text:'',ts:Date.now()}),8000);
};

function showLiveTyping(text){
  const msgs=document.getElementById('messages');
  if(!liveTypingEl){
    liveTypingEl=document.createElement('div');
    liveTypingEl.className='typing-row';
    const b=document.createElement('div');b.className='typing-bubble';
    b.innerHTML='<span class="td"></span><span class="td"></span><span class="td"></span>';
    liveTypingEl.appendChild(b);
    msgs.appendChild(liveTypingEl);
  }
  msgs.scrollTop=msgs.scrollHeight;
  clearTimeout(liveTypingTimer);
  liveTypingTimer=setTimeout(hideLiveTyping,10000);
}
function hideLiveTyping(){
  if(liveTypingEl){liveTypingEl.remove();liveTypingEl=null;}
  clearTimeout(liveTypingTimer);
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Render message
function renderMsg(msg,isMine){
  hideLiveTyping();
  const msgs=document.getElementById('messages');
  const sameAuthor=lastGender===msg.gender;
  lastGender=msg.gender;

  const wrap=document.createElement('div');
  wrap.className='msg-wrap '+(isMine?'mine':'theirs');

  if(!sameAuthor){
    const name=document.createElement('div');
    name.className='sender-name';
    name.textContent=isMine?'You':(msg.gender==='male'?'He / Him':'She / Her');
    wrap.appendChild(name);
  }

  const bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML=escapeHtml(msg.text);

  const meta=document.createElement('div');meta.className='bubble-meta';
  const t=document.createElement('span');t.className='btime';
  t.textContent=fmtTime(msg.time);
  meta.appendChild(t);

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}

function fmtTime(ts){
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// Clear
window.clearChat=async function(){
  if(!confirm('Clear all messages? This cannot be undone.'))return;
  await remove(ref(db,'messages'));
  await set(ref(db,'livetyping/male'),{text:'',ts:Date.now()});
  await set(ref(db,'livetyping/female'),{text:'',ts:Date.now()});
  renderedKeys.clear();lastGender=null;
  document.getElementById('messages').innerHTML='';
  document.getElementById('ci-preview').textContent='No messages yet';
  showToast('Chat cleared');
};

// WebRTC
window.startCall=async function(){
  if(!partnerOn){showToast('Partner is offline');return;}
  if(inCall)return;
  isCallerRole=true;
  await setupPC();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  await set(ref(db,`calls/${other()}`),{type:'offer',sdp:offer.sdp,from:myGender});
  showToast('Calling…');
};

function showIncomingCall(v){
  document.getElementById('incoming-call').classList.add('active');
  window._pendingOffer=v;
}
window.acceptCall=async function(){
  document.getElementById('incoming-call').classList.remove('active');
  isCallerRole=false;
  await setupPC();
  await pc.setRemoteDescription({type:'offer',sdp:window._pendingOffer.sdp});
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await set(ref(db,`calls/${other()}`),{type:'answer',sdp:answer.sdp});
  startCallUI();
};
window.declineCall=async function(){
  document.getElementById('incoming-call').classList.remove('active');
  await set(ref(db,`calls/${other()}`),{type:'end'});
  await remove(ref(db,`calls/${myGender}`));
};
async function handleAnswer(sdp){
  if(!pc)return;
  await pc.setRemoteDescription({type:'answer',sdp});
  startCallUI();
}
async function handleRemoteIce(candidate){
  if(!pc||!candidate)return;
  try{await pc.addIceCandidate(new RTCIceCandidate(candidate));}catch(e){}
}
async function setupPC(){
  localStream=await navigator.mediaDevices.getUserMedia({audio:true});
  pc=new RTCPeerConnection(STUN);
  pc.onicecandidate=e=>{
    if(e.candidate)set(ref(db,`calls/${other()}`),{type:'ice-candidate',candidate:e.candidate.toJSON()});
  };
  pc.ontrack=e=>{document.getElementById('remote-audio').srcObject=e.streams[0];};
  pc.onconnectionstatechange=()=>{
    if(['disconnected','failed','closed'].includes(pc.connectionState))endCallCleanup();
  };
}
function startCallUI(){
  inCall=true;
  document.getElementById('call-bar').classList.add('active');
  callSeconds=0;
  callTimerInt=setInterval(()=>{
    callSeconds++;
    const m=String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s=String(callSeconds%60).padStart(2,'0');
    document.getElementById('call-timer').textContent=`${m}:${s}`;
  },1000);
}
window.toggleMute=function(){
  if(!localStream)return;
  isMuted=!isMuted;
  localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  const btn=document.getElementById('mute-btn');
  btn.textContent=isMuted?'Unmute':'Mute';
  btn.classList.toggle('muted',isMuted);
};
window.endCall=async function(){
  await set(ref(db,`calls/${other()}`),{type:'end'});
  await remove(ref(db,`calls/${myGender}`));
  endCallCleanup();
};
function endCallCleanup(){
  inCall=false;isCallerRole=false;isMuted=false;
  clearInterval(callTimerInt);
  document.getElementById('call-bar').classList.remove('active');
  document.getElementById('incoming-call').classList.remove('active');
  document.getElementById('mute-btn').textContent='Mute';
  document.getElementById('mute-btn').classList.remove('muted');
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(pc){pc.close();pc=null;}
  remove(ref(db,`calls/${myGender}`));
}

// Emoji
function buildEmojiTray(){
  const tray=document.getElementById('emoji-tray');
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');b.className='ebtn';b.textContent=e;
    b.onclick=()=>{
      const inp=document.getElementById('msg-input');
      const p=inp.selectionStart;
      inp.value=inp.value.slice(0,p)+e+inp.value.slice(inp.selectionEnd);
      inp.selectionStart=inp.selectionEnd=p+e.length;
      inp.focus();autoResize(inp);broadcastLiveTyping();
    };
    tray.appendChild(b);
  });
}
window.toggleEmoji=function(){
  document.getElementById('emoji-tray').classList.toggle('open');
  document.getElementById('etoggle').classList.toggle('active');
};

window.handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3000);
}
window.showToast=showToast;

window.addEventListener('beforeunload',()=>{
  if(myGender){
    set(ref(db,`livetyping/${myGender}`),{text:'',ts:Date.now()});
    set(ref(db,`presence/${myGender}`),{online:false,ts:Date.now()});
    if(inCall)endCall();
  }
});
</script>
